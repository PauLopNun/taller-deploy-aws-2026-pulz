name: Deploy to ECR

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: taller-deploy-aws-2026-repository-pulz
  ACCOUNT_ID: 822414985516

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Give execute permission to mvnw
        run: chmod +x mvnw

      - name: Build application (JAR)
        run: ./mvnw clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::822414985516:role/taller-deploy-aws-2026-rol-pulz
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build Docker image
        run: |
          docker build -f Dockerfile -t $ECR_REPOSITORY:latest .

      - name: Show Docker image size
        run: |
          IMAGE_TAG="$ECR_REPOSITORY:latest"
          SIZE_BYTES=$(docker image inspect "$IMAGE_TAG" --format='{{.Size}}')
          SIZE_MB=$(awk "BEGIN {printf \"%.2f\", $SIZE_BYTES/1024/1024}")
          echo "Image size: ${SIZE_BYTES} bytes (${SIZE_MB} MB)"

      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:latest $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Push image to ECR
        run: |
          docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Show image info
        run: docker images

