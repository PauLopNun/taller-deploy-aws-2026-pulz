name: CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  validate-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ ! "$BRANCH" =~ ^[0-9]+-[a-z0-9-]+$ ]]; then
            echo "Branch invalida: '$BRANCH'. Formato esperado: 1234-descripcion"
            exit 1
          fi

  validate-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit messages
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          INVALID=0
          while IFS= read -r msg; do
            if [[ ! "$msg" =~ ^[0-9]+-.+ ]]; then
              echo "Commit invalido: '$msg'"
              INVALID=1
            fi
          done < <(git log "$BASE..$HEAD" --format="%s")
          [ $INVALID -eq 0 ]

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Give execute permission
        run: chmod +x mvnw
      - name: Run tests
        run: ./mvnw test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f Dockerfile -t practica:${{ github.sha }} .
      - name: Show Docker image size
        run: |
          IMAGE_TAG="practica:${{ github.sha }}"
          SIZE_BYTES=$(docker image inspect "$IMAGE_TAG" --format='{{.Size}}')
          SIZE_MB=$(awk "BEGIN {printf \"%.2f\", $SIZE_BYTES/1024/1024}")
          echo "Image size: ${SIZE_BYTES} bytes (${SIZE_MB} MB)"
